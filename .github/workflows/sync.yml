name: Fetch and Sync SRS Files to Main

on:
  workflow_dispatch:
  schedule:
    - cron: "37 7 * * *"

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Download external files
        run: |
          curl -Lo adguard.srs   "https://cdn.jsdelivr.net/gh/jinndi/adguard-filter-list-srs@main/adguard-filter-list.srs"
          curl -Lo cheburnet.srs "https://cdn.jsdelivr.net/gh/jinndi/geosite-cheburnet@main/geosite-cheburnet.srs"
          curl -Lo filter.srs    "https://cdn.jsdelivr.net/gh/jinndi/fakeip-filter-srs@main/fakeip-filter.srs"
          curl -Lo proxy.srs     "https://cdn.jsdelivr.net/gh/jinndi/geosite-blocked@main/geosite-blocked.srs"
          curl -Lo ruip.srs      "https://cdn.jsdelivr.net/gh/jinndi/geoip-ru@main/ru-no-blocked.srs"

          curl -Lo ru.srs        "https://cdn.jsdelivr.net/gh/KaringX/karing-ruleset@sing/geo/geosite/category-ru.srs"
          curl -Lo ipdetect.srs  "https://cdn.jsdelivr.net/gh/KaringX/karing-ruleset@sing/geo/geosite/category-ip-geo-detect.srs"
          curl -Lo private.srs   "https://cdn.jsdelivr.net/gh/KaringX/karing-ruleset@sing/geo/geosite/private.srs"
          curl -Lo trackers.srs  "https://cdn.jsdelivr.net/gh/KaringX/karing-ruleset@sing/geo/geosite/category-public-tracker.srs"
          curl -Lo games.srs     "https://cdn.jsdelivr.net/gh/KaringX/karing-ruleset@sing/geo/geosite/category-games.srs"
          curl -Lo ai.srs        "https://cdn.jsdelivr.net/gh/KaringX/karing-ruleset@sing/geo/geosite/category-ai-chat-!cn.srs"

      - name: Commit and Push changes
        run: |
          if [ -z "$(git status --porcelain '*.srs')" ]; then
            echo "Файлы не изменились. Выходим."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add '*.srs'
          git commit -m "[auto] Update synced rules $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main

      - name: Purge jsDelivr Cache
        run: |
          BASE_URL="https://purge.jsdelivr.net/gh/jinndi/singbox_ruleset@main"

          for file in adguard.srs cheburnet.srs filter.srs proxy.srs ruip.srs; do
            curl -sfL "$BASE_URL/$file"
          done

          BASE_URL2="https://purge.jsdelivr.net/gh/jinndi/singbox_ruleset@main"

          for file in ru.srs ipdetect.srs private.srs trackers.srs games.srs ai.srs; do
            curl -sfL "$BASE_URL2/$file"
          done